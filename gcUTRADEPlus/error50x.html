<html>
<head>
	<title>Page Error</title>
	<style type = text/css>
		a { 
			text-decoration: none;
			color: #008CA8
		}
		a:hover { color:red }
		
		p.stdTxtColor { color: #858585 }
		p.hdrStyle {
			font-family: Arial;
			font-size: 30;
			vertical-align: middle;
			color: #3D3D3D;
		}
		
		td.padTop{ padding-top:4.5em; }
		td.padBtm{ padding-bottom:1.5em; }
		td.stdTxtFormat { 
			font-family: Arial; 
			font-size:13px; 
			color:#858585"
		}
	</style>
</head>
	<body>
		<table align = "center" valign = "middle" width = "750">
			<!--"Back to home" button & "Help" button-->
			<col width = "50"> <!--Table column width-->
			<tr align = "right">
				<td colspan = "3" class = "padBtm">
					<a href = "http://web.utradeph.com">
						<img src = "/gcUTRADEPlus/img/errors/btn_home.png" alt = "" Hspace = "10" Vspace = "10"/>
					</a>
				</td>
			</tr>
			
			<!--Header-->
			<tr>
				<!--Logo image-->
				<td align = "left" colspan = "2" valign = "middle">
					<!--img src = "/gcUTRADEPlus/img/itrade-logo.gif"/-->
				</td>
		
				<!--"Temporary Error" message"-->
				<td background = "/gcUTRADEPlus/img/errors/headerBg.png">
					<p class = "hdrStyle">
						Temporary Error (50x)
					</p>
				</td>
			</tr>
			
			<!--Error Message-->
			<tr>
				<td colspan = "3" class = "padTop stdTxtFormat">
					<p class = "stdTxtColor"><b>We're sorry, web.utradeph.com is temporarily unavailable. We apologize
					   for the inconvenience and suggest trying again in a few minutes.<br/>
					   <br/>
					  
					   <br/><br/>
					   </b>
					</p>
				</td>
			</tr>
			
			<!--"Try Again" and "Sign Out" selection-->
			<tr>
				<td class = "padBtm stdTxtFormat" width = "10%">
					<a href = "http://web.utradeph.com">
						<b><u>Try Again</u></b>
					</a>
				</td>
				<td class = "padBtm stdTxtFormat">&nbsp;

				</td>
			</tr>
			
			<!--"Detailed Technical Info"-->
			<tr cellpadding = "3">
				<td colspan = "2" class = "stdTxtFormat">
					<b>
						&nbsp;
						<br/>
						
						<br/>
					</b>
				</td>
			</tr>
		</table>
	</body>
</html>
