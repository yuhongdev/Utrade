
<!doctype html>
<html>

<head>
    <title>Login page</title>
    <meta http-equiv="X-UA-Compatible" content="IE=10; IE=9; IE=8; IE=7; IE=EDGE" />
    <link rel="stylesheet" href="../../login/css/bootstrap-5.3.6.min.css" />
    <link rel="stylesheet" href="../../login/css/login.css" />
    <link rel="stylesheet" href="../../login/css/popup-modal-bootstrap5.css" />
    
    <link href="https://fonts.googleapis.com/css?family=Montserrat:600|Roboto+Slab" rel="stylesheet">

    <!-- <link rel="stylesheet" type="text/css" href="../css/bootstrap.css"> -->
    <!-- <link rel="stylesheet" type="text/css" href="../css/login.css"> -->
    
    <style>
        
        body{
            background: #009b4d;
            font-family: 'Roboto Slab', Arial, "Helvetica Neue", Helvetica, sans-serif;
            overflow: hidden;
        }

        
        #divLogin{
            /*border-radius: 4px;*/
            /*width: 350px;*/
            background: #009b4d;
            color: #fff;
            
            padding: 35px;
            /*box-shadow: 0 0 35px rgba(0,0,0,0.2);*/
            font-size: 11px;
            line-height: 18px;
        }
        #login-section-wrap{
            color: #fff;
        }
        #login-section-wrap a{
            font-weight: 400;
            text-decoration: none;
            opacity: 1;
            color: #ffca36;
            font-style: italic;
        -webkit-transition: all .3s ease-in-out;
            -moz-transition: all .3s ease-in-out;
            -o-transition: all .3s ease-in-out;
            transition: all .3s ease-in-out;
        }
        #login-section-wrap a:hover, #login-section-wrap a:focus{
            opacity: 1;
            color: #ffca36;
            box-shadow: 0 1px 0 0 #ffca36;
            text-decoration: none;
        }
        #login-section-wrap p{
            margin-bottom: 10px;
            line-height: 18px;
        }
        .form-header{
            font-family: 'Montserrat', Arial, "Helvetica Neue", Helvetica, sans-serif;
            color: #fff;
            font-size: 20px;
            line-height: 26px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin: 0 0 15px;
        }
        .utrade-form-group{
            position: relative;
            margin-bottom: 15px;
        }
        .utrade-form-group .utrade-form-control{
            padding: 2px 10px !important;
            height: 34px;
            border-radius: 0 !important;
            border: 0 !important;
            width: 100%;
            color: #333;
            font-size: 14px;
            line-height: 22px;
            font-family: 'Roboto Slab', Arial, "Helvetica Neue", Helvetica, sans-serif;
        }
        .utrade-form-group .utrade-form-control:focus{
            border: 0;
            outline: none;
            box-shadow: none;
        }
        .utrade-form-group .ubtn{
            line-height: 20px !important;
            padding: 2px 20px !important;
            height: 34px !important;
            border-radius: 0 !important;
            text-transform: none !important;
            letter-spacing: 0 !important;
            font-size: 14px !important;
            border: 0;
            outline: none;
            font-family: 'Montserrat', Arial, "Helvetica Neue", Helvetica, sans-serif;
        }
        .btn-yellow{
            background: #ffca36 !important;
            color: #34495e !important;
            font-weight: 600;
        }
        .utrade-row{
            display: block;
            overflow: hidden;
        }
        .utrade-row .col-6{
            width: 50%;
            float: left;
        }

        #divLogon, #divForgetPwd, #divForgetPin, #divForceChgPwd, #divForceChgPin, #divForceChgHint{
            color: #fff;
            padding: 35px;
        }
        label{
            font-weight: 600;
        }

    </style>
</head>

<body>

    <div id="login-section-wrap" style="position:relative">
        <div class="box">
            <!-- start divLogin -->
            <div id="divLogin">
                <div class="box-body">

                    <div class="top">
                        <h2 class="form-header">Login</h2>
                    </div>
                    <form id="frmLogin" class="form-area">

                        <div class="utrade-form-group username-wrap">
                            <input type="text" id="frmLogin_userID" name="frmLogin_userID" class="utrade-form-control" placeholder="Username">
                            <i class="fa fa-user"></i>
                        </div>
                        <div class="utrade-form-group password-wrap">
                            <input type="password" id="frmLogin_password" name="frmLogin_password" class="utrade-form-control" placeholder="Password">
                            <i class="fa fa-key"></i>
                        </div>

                        <!--<div class="checkbox">
                            <label>
                              <input id="checkbox101" type="checkbox" checked> Remember Me
                            </label>
                        </div>-->
                        
                        <div class="row">
                        	<div class="col-6">
                                <div class="utrade-form-group">
                            		<button type="button" class="ubtn btn-yellow openModalBtn" data-type="login">Login</button>
                                </div>
                        	</div>
                        	<div class="col-6">
                        		<div class="utrade-form-group" style="margin-top: 8px;">
                                  <a href="javascript:void(0);" class="openModalBtn" data-type="fgtPin"><i class="fa fa-lock"></i> Forgot Password >></a>      
                                </div>
                        	</div>
                        </div>
                   	</form>

                   	<div>
                        <div>Not yet a client? <a href="https://utradeph.com/open-an-account/" target="_blank">Register now &gt;&gt;</a></div>
                        <div>Try the 7-day trial account period? <a href="https://utradeph.com/register-trial-account/" target="_blank">Sign up now &gt;&gt;</a></div>
                    </div>

                </div>

            </div>

            <div id="divLogon" name="divLogon" style="display:none">
                <div class="box-body">
                    <div class="top">
                        <h1 id="modal-recoverLabel" class="form-header">Welcome </h1>
                        <label id="lblUsername">user</label>
                    </div>
                    <div class="form-area">
                        <div class="form-actions">
                            <input onclick="top.location = tradingHall_url" class="btn btn-secondary w-100 mb-2" value="Trading Hall" type="submit">
                            <button type="button" class="btn btn-secondary w-100 mb-2 openModalBtn" data-type="chgPwd">Change Password</button>
                            <button type="button" class="btn btn-secondary w-100 mb-2 openModalBtn" data-type="chgPin">Change PIN</button>
                            <button type="button" class="btn btn-secondary w-100 mb-2 openModalBtn" data-type="fgtPin">Forgot PIN</button>
                            <button type="button" onclick="confirmLogout()" class="btn btn-secondary w-100 mb-2">Log Out</button>
                            <li onclick="confirmLogout()" class="btn btn-secondary w-100 mb-2">Log Out </li>
                        </div>
                    </div>
                </div>
                <div class="footer-links row">
                    <div class="col-6 text-start">
                        <a id="btnChgHint" name="btnChgHint" onClick="chgLayout(6);" value="ChangeHint" type="button"><i class="fa fa-lock"></i> Change Hint </a>
                    </div>
                </div>
            </div>

            <div id="divForgetPwd" name="divForgetPwd" style="display:none">
                <div class="box-body">
                    <div class="top">
                        <h1 id="modal-recoverLabel" class="form-header">Forgot password </h1>
                    </div>
                    <form id="frmForgetPwd" name="frmForgetPwd" class="form-area">
                        <div class="form-group mb-2 group">
                            <input type="text" id="frmForgetPwd_userID" name="frmForgetPwd_userID" class="form-control" placeholder="Username" size="30" />
                            <i class="fa fa-key"></i>
                            <div class="clearfix mt-2"></div>
                            <input id="frmForgetPwd_btnGetHint" name="frmForgetPwd_btnGetHint" form="frmForgetPwd" class="btn btn-sm btn-secondary" value="Retrieve Hint" type="submit">
                        </div>
                        <div class="form-group mb-2 group">
                            <input type="text" id="frmForgetPwd_pwdHint" name="frmForgetPwd_pwdHint" class="form-control" placeholder="Hint to Password" />
                            <i class="fa fa-key"></i>
                        </div>
                        <div class="form-group mb-2 group">
                            <input type="text" id="frmForgetPwd_ansHint" name="frmForgetPwd_ansHint" class="form-control" placeholder="Answer to Hint" />
                            <i class="fa fa-key"></i>
                        </div>
                        <div class="form-group mb-2">
                            <input type="submit" value="Submit" class="btn btn-secondary w-100" />
                        </div>

                    </form>
                </div>
                <div class="footer-links row">
                    <div class="col-6 text-start">
                        <a id="frmForgetPwd_btnClose" name="frmForgetPwd_btnClose" value="Close" onClick="chgLayout(8);" type="button"><i class="fa fa-times-circle"></i> Close </a></div>
                </div>
            </div>

            <div id="divForgetPin" name="divForgetPin" style="display:none">
                <div class="box-body">
                    <div class="top">
                        <h1 id="modal-recoverLabel" class="form-header">Forgot PIN </h1>
                    </div>
                    <form id="frmForgetPin" name="frmForgetPin" class="form-area">
                        <div class="form-group mb-2 group" style="display:none;">
                            <input type="hidden" id="frmForgetPin_userID" name="frmForgetPin_userID" value="" />
                        </div>

                        <div class="form-group mb-2 group">
                            <input type="text" id="frmForgetPin_pinHint" name="frmForgetPin_pinHint" class="form-control" placeholder="Hint to Pin" />
                            <i class="fa fa-lightbulb-o"></i>
                        </div>
                        <div class="form-group mb-2 group">
                            <input type="text" id="frmForgetPin_ansHint" name="frmForgetPin_ansHint" class="form-control" placeholder="Answer to Hint" />
                            <i class="fa fa-unlock-alt"></i>
                        </div>

                        <div class="form-group mb-2">
                            <input type="submit" value="Submit" class="btn btn-secondary w-100" />
                        </div>
                    </form>
                </div>
                <div class="footer-links row">
                    <div class="col-6 text-start">
                        <a id="frmForgetPin_btnClose" name="frmForgetPin_btnClose" value="Close" onClick="chgLayout(1);" type="button"><i class="fa fa-times-circle"></i> Close </a>
                    </div>
                </div>
            </div>

            <div id="divForceChgPwd" name="divForceChgPwd" style="display:none">
                <div class="box-body">
                    <div class="top">
                        <h1 id="modal-recoverLabel" class="form-header">Change password </h1>
                    </div>
                    <form id="frmForceChgPwd" name="frmForceChgPwd" class="form-area">
                        <div class="form-group mb-2 group">
                            <input type="password" id="frmForceChgPwd_oldPwd" name="frmForceChgPwd_oldPwd" class="form-control" placeholder="Current Password">
                            <i class="fa fa-key"></i>
                        </div>
                        <div class="form-group mb-2 group">
                            <input type="password" id="frmForceChgPwd_newPwd" name="frmForceChgPwd_newPwd" class="form-control" placeholder="New Password">
                            <i class="fa fa-key"></i>
                        </div>
                        <div class="form-group mb-2 group">
                            <input type="password" id="frmForceChgPwd_confPwd" name="frmForceChgPwd_confPwd" class="form-control" placeholder="Confirm New Password" />
                            <i class="fa fa-key"></i>
                        </div>
                        <div class="form-group mb-2">
                            <input type="submit" value="Submit" class="btn btn-secondary w-100" />
                        </div>
                    </form>
                </div>
                <div class="footer-links row">
                    <div class="col-6 text-start">
                        <a id="frmForceChgPwd_btnClose" name="frmForceChgPwd_btnClose" onClick="chgLayout(1);" value="Close" type="button"><i class="fa fa-times-circle"></i> Close </a></div>
                </div>
            </div>

            <div id="divForceChgPin" name="divForceChgPin" style="display: none;">
                <div class="box-body">
                    <div class="top">
                        <h1 id="modal-recoverLabel" class="form-header">Change PIN </h1>
                    </div>
                    <form id="frmForceChgPin" name="frmForceChgPin" class="form-area">
                        <div class="form-group mb-2 group">
                            <input type="password" id="frmForceChgPin_oldPin" name="frmForceChgPin_oldPin" class="form-control" placeholder="Current PIN" />
                            <i class="fa fa-key"></i>
                        </div>
                        <div class="form-group mb-2 group">
                            <input type="password" id="frmForceChgPin_newPin" name="frmForceChgPin_newPin" class="form-control" placeholder="New PIN" />
                            <i class="fa fa-key"></i>
                        </div>
                        <div class="form-group mb-2 group">
                            <input type="password" id="frmForceChgPin_confPin" name="frmForceChgPin_confPin" class="form-control" placeholder="Confirm New PIN" />
                            <i class="fa fa-key"></i>
                        </div>
                        <div class="form-group mb-2">
                            <input type="submit" value="Submit" class="btn btn-secondary w-100" />
                        </div>
                    </form>
                </div>
                <div class="footer-links row">
                    <div class="col-6 text-start">
                        <a id="frmForceChgPin_btnClose" name="frmForceChgPin_btnClose" value="Close" onClick="chgLayout(1);" type="button"><i class="fa fa-times-circle"></i> Close </a>
                    </div>
                </div>
            </div>

            <div id="divForceChgHint" name="divForceChgHint" style="display: none;">
                <div class="box-body">
                    <div class="top">
                        <h1 id="modal-recoverLabel" class="form-header">Change Hint </h1>
                    </div>
                    <form id="frmForceChgHint" name="frmForceChgHint" class="form-area">
                        <div class="form-group mb-2 group">
                            <select id="frmForceChgHint_hintType" name="frmForceChgHint_hintType" class="form-select">
								<option value="OTR">My own question</option>
								<option value="Mother maiden name">Mother maiden name</option>
								<option value="My favourite cartoon">My favourite cartoon</option>
								<option value="My favourite car">My favourite car</option>
								<option value="Name of my pet">Name of my pet</option>
							</select>
                            <i class="fa fa-lock"></i>
                        </div>
                        <div class="form-group mb-2 group">
                            <input id="frmForceChgHint_hint" name="frmForceChgHint_hint" class="form-control" placeholder="My question" type="text">
                            <i class="fa fa-lock"></i>
                        </div>
                        <div class="form-group mb-2 group">
                            <input type="text" id="frmForceChgHint_hintAns" name="frmForceChgHint_hintAns" class="form-control" placeholder="Hint Answer" />
                            <i class="fa fa-lock"></i>
                        </div>
                        <div class="form-group mb-2">
                            <input type="submit" value="Submit" class="btn btn-secondary w-100" />
                        </div>
                    </form>
                </div>
                <div class="footer-links row">
                    <div class="col-6 text-start">
                        <a id="frmForceChgHint_btnClose" name="frmForceChgHint_btnClose" onClick="chgLayout(1);" value="Close" type="button"><i class="fa fa-times-circle"></i> Close </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/jquery.jcryption.min.js"></script>
    <script src="../../js/crypto-js-4.2.0.min.js"></script>
    <script src="../js/AesUtil.js"></script>
    <!-- <script src="../js/aes.js"></script>
    <script src="../js/pbkdf2.js"></script> -->
    <script src="../js/common_util.js"></script>
    <script src="../js/login_conf.js"></script>
    <script src="../js/login_main.js"></script>
    <script src="../js/bms_setting.js"></script>
    <script src="../../js/validate/jquery.validate-1.22.1.min.js"></script>
    <script src="../js/cliLogin.js"></script>

    <script src="../../login/js/bootstrap-5.3.6.bundle.min.js"></script>
    <script src="../../login/passport-login-bc.jsp"></script>
    <script src="../../login/js/login-popup-bootstrap5.js"></script>

</body>

</html>
