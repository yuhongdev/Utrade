		function downloadPDF(rptId, rptName){
			var action;
			if(checkIOS()){
				action = "displayNewTab";
			}else{
				action = "download";
			}
			getPDFRptById(rptId, rptName, action);
		}
		function hideDiv(value){
			$('#'+value+'summaryTbl').css("display", "none");
			$('#'+value+'upDwnImg').attr("src", "/img/gcCIMB/Icon_DropDown.gif");
			$('#'+value+'aTag').attr("onclick", "showDiv('"+value+"')");
		}
		
		function showDiv(value){
			$('#'+value+'summaryTbl').css("display", "");
			$('#'+value+'upDwnImg').attr("src", "../css/images/Icon_DropUp.gif");
