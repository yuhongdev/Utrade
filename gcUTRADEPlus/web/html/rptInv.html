	<script>

		$(function(){
			$("#frDt").datepicker(
				{
					dateFormat: "dd-mm-yy",
					changeMonth: true,
					changeYear: true,
					beforeShow: function(){
						$(".ui-datepicker").css("font-size",12);
					}
				}
			);
			$("#toDt").datepicker(
				{
					dateFormat: "dd-mm-yy",
					changeMonth: true,
					changeYear: true,
					beforeShow: function(){
						$(".ui-datepicker").css("font-size",12);
					}
				}
			);

			var frDate1 = new Date();
			frDate1.setMonth(frDate1.getMonth() - 1);
			frDate1 = frDate1.getDate() + "-" + (frDate1.getMonth()+1) + "-" + frDate1.getFullYear();
			$("#frDt").val(frDate1);
			
			var toDate1 = new Date();
			toDate1.setDate(toDate1.getDate() - 1);
			toDate1 = toDate1.getDate() + "-" + (toDate1.getMonth()+1) + "-" + toDate1.getFullYear();
			$("#toDt").val(toDate1);
		});
			
		<!--Check login status-->
		$(document).ready(function(){
            chkSess();
			console.log("Login Agent Value :" + login_agent);
			if(login_agent!=null){
				if(login_agent){
					trdAccATP();
				}else{
					$('#summaryTbl').hide();
					location.href='../../web/html/noSession.html';
				}
			}			
		});
	</script>

		function downloadPDF(rptId, rptName){
			var action;
			if(checkIOS()){
