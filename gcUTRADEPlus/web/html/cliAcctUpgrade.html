
<!doctype html>
<html>

<head>
    <title>Trial Account Upgrade Page</title>
    <meta http-equiv="X-UA-Compatible" content="IE=10; IE=9; IE=8; IE=7; IE=EDGE" />
    <link rel="stylesheet" href="../css/bootstrap-5.3.6.min.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="/passport/login/css/popup-modal-bootstrap5.css" />
    
    <link href="https://fonts.googleapis.com/css?family=Montserrat:600|Roboto+Slab" rel="stylesheet">

    <!-- <link rel="stylesheet" type="text/css" href="../css/bootstrap.css"> -->
    <!-- <link rel="stylesheet" type="text/css" href="../css/login.css"> -->
    
    <style>
        
        body{
            background: #009b4d;
            font-family: 'Roboto Slab', Arial, "Helvetica Neue", Helvetica, sans-serif;
            overflow: hidden;
        }

        
        #divLogin{
            /*border-radius: 4px;*/
            /*width: 350px;*/
            background: #009b4d;
            color: #fff;
            
            padding: 35px;
            /*box-shadow: 0 0 35px rgba(0,0,0,0.2);*/
            font-size: 11px;
            line-height: 18px;
        }
        #login-section-wrap{
            color: #fff;
        }
        #login-section-wrap a{
            font-weight: 400;
            text-decoration: none;
            opacity: 1;
            color: #ffca36;
            font-style: italic;
        -webkit-transition: all .3s ease-in-out;
            -moz-transition: all .3s ease-in-out;
            -o-transition: all .3s ease-in-out;
            transition: all .3s ease-in-out;
        }
        #login-section-wrap a:hover, #login-section-wrap a:focus{
            opacity: 1;
            color: #ffca36;
            box-shadow: 0 1px 0 0 #ffca36;
            text-decoration: none;
        }
        #login-section-wrap p{
            margin-bottom: 10px;
            line-height: 18px;
        }
        .form-header{
            font-family: 'Montserrat', Arial, "Helvetica Neue", Helvetica, sans-serif;
            color: #fff;
            font-size: 20px;
            line-height: 26px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin: 0 0 15px;
        }
        .utrade-form-group{
            position: relative;
            margin-bottom: 15px;
        }
        .utrade-form-group .utrade-form-control{
            padding: 2px 10px !important;
            height: 34px;
            border-radius: 0 !important;
            border: 0 !important;
            width: 100%;
            color: #333;
            font-size: 14px;
            line-height: 22px;
            font-family: 'Roboto Slab', Arial, "Helvetica Neue", Helvetica, sans-serif;
        }
        .utrade-form-group .utrade-form-control:focus{
            border: 0;
            outline: none;
            box-shadow: none;
        }
        .utrade-form-group .ubtn{
            line-height: 20px !important;
            padding: 2px 20px !important;
            height: 34px !important;
            border-radius: 0 !important;
            text-transform: none !important;
            letter-spacing: 0 !important;
            font-size: 14px !important;
            border: 0;
            outline: none;
            font-family: 'Montserrat', Arial, "Helvetica Neue", Helvetica, sans-serif;
        }
        .btn-yellow{
            background: #ffca36 !important;
            color: #34495e !important;
            font-weight: 600;
        }
        .utrade-row{
            display: block;
            overflow: hidden;
        }
        .utrade-row .col-6{
            width: 50%;
            float: left;
        }

        #divLogon, #divForgetPwd, #divForgetPin, #divForceChgPwd, #divForceChgPin, #divForceChgHint{
            color: #fff;
            padding: 35px;
        }
        label{
            font-weight: 600;
        }

    </style>
</head>

<body>

    <div id="login-section-wrap" style="position:relative">
        <div class="box">
            <!-- start divLogin -->
            <div id="divLogin">
                <div class="box-body">

                    <div class="top">
                        <h2 class="form-header">Trial Account Upgrade</h2>
                    </div>
                    <form id="frmLogin" class="form-area">

                        <div class="utrade-form-group username-wrap">
                            <input type="text" id="frmLogin_userID" name="frmLogin_userID" class="utrade-form-control" placeholder="Username">
                            <i class="fa fa-user"></i>
                        </div>
                        <div class="utrade-form-group password-wrap">
                            <input type="password" id="frmLogin_password" name="frmLogin_password" class="utrade-form-control" placeholder="Password">
                            <i class="fa fa-key"></i>
                        </div>

                        <!--<div class="checkbox">
                            <label>
                              <input id="checkbox101" type="checkbox" checked> Remember Me
                            </label>
                        </div>-->
                        
                        <div class="row">
                            <div class="col-12">
                                <div class="utrade-form-group text-center">
                                    <button type="submit" class="ubtn btn-yellow openModalBtn" data-type="login">Upgrade Account</button>
                                </div>
                            </div>
                        </div>
                    </form>

                </div>

            </div>


        </div>
    </div>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/jquery.jcryption.min.js"></script>
    <script src="../../js/crypto-js-4.2.0.min.js"></script>
    <script src="../js/AesUtil.js"></script>
    <!-- <script src="../js/aes.js"></script>
    <script src="../js/pbkdf2.js"></script> -->
    <script src="../js/common_util.js"></script>
    <script src="../js/login_conf.js"></script>
    <script src="../js/login_main.js"></script>
    <script src="../js/bms_setting.js"></script>
    <script src="../js/validate/jquery.validate-1.22.1.min.js"></script>
    <script src="../js/cliLogin.js"></script>
    
    <script src="../js/bootstrap-5.3.6.bundle.min.js"></script>
    <script src="../../passport-login-bc.jsp"></script>
    <script src="/passport/login/js/login-popup-bootstrap5.js"></script>
</body>

</html>
