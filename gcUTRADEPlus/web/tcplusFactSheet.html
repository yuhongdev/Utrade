	function encDisplayPDF(jsonObject) {
		var encryptedJSONStr;
		var csReqParam;
		var jsonData = JSON.stringify(jsonObject);
		inputValue = jsonData;
		if (ct != 0) {
			encryptValue(function(output) {
				outputValue = output
			});
		}
		csReqParam = MD5CheckSum(outputValue);
		displayPDFMutualFundInNewTab(outputValue, csReqParam);
	}

	function displayPDFMutualFundInNewTab(encryptedJSONStr, csParam) {
		var ctReqParam = ct + "," + public_id;
		$("#ae").val(ae);
		$("#ct").val(ctReqParam);
		$("#ev").val(encryptedJSONStr);
		$("#cs").val(csParam.toString());
		$("#frmViewPdf").attr("action", api_path + "viewMutualFund?");
		$("#frmViewPdf").attr("method", "get");

		$("#frmViewPdf_submit").click();
	}
</script>
